<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup | AgriAssist</title>
<link rel="stylesheet" href="signup.css">

</head>

<body>

<header>
  <h1>AgriAssist</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- SAME SVG ICONS -->
  <div class="social-icons">
    <a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg"></a>
    <a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg"></a>
    <a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/linkedin.svg"></a>
    <a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/whatsapp.svg"></a>
  </div>
</header>

<main>

<div class="container">
  <div class="image-section"></div>

  <div class="form-section">
    <h1>Create Account</h1>
    <p>Join AgriAssist to start managing your farm smarter.</p>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" placeholder="Enter your full name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="Enter your email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="Create a password">
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" placeholder="Re-enter your password">
    </div>

    <button class="btn">Signup</button>

    <!-- 🔥 FIXED ICONS -->
    <div class="social-login">
      <a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg"></a>
      <a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg"></a>
      <a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/linkedin.svg"></a>
      <a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/whatsapp.svg"></a>
    </div>

    <div class="login-link">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>
</div>

</main>

<footer>
  <p>🌿 © 2025 AgriAssist | Empowering Farmers with Technology 🌿</p>
  <p>Made with ❤️ by Prabhjot Kaur</p>
</footer>

</body>
</html>
