<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | FarmMan</title>
    <link rel="stylesheet" a href="signup.css">
    <link rel="stylesheet" a href="header.css">
    <link rel="stylesheet" a href="footer.css">
</head>

<body>

    <!-- ======= Header ======= -->
    <header>
        <h1>AgriAssist</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>

        <!-- Social Media Icons -->
        <div class="social-icons">
            <a href="https://facebook.com" target="_blank">
                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg" alt="Facebook">
            </a>
            <a href="https://instagram.com" target="_blank">
                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg" alt="Instagram">
            </a>
            <a href="https://linkedin.com" target="_blank">
                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/linkedin.svg" alt="LinkedIn">
            </a>
            <a href="https://whatsapp.com" target="_blank">
                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/whatsapp.svg" alt="WhatsApp">
            </a>
        </div>
    </header>


    <div class="container">
        <div class="image-section"></div>
        <div class="form-section">
            <h1>Create Account</h1>
            <p>Join AgriAssist to start managing your farm smarter.</p>

            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password">
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Re-enter your password">
            </div>

            <button class="btn" onclick="validateForm()">Signup</button>

            <div class="social-login">
                <button><img src="facebook.png" width="20"></button>
                <button><img src="instagram.png" width="20"></button>
                <button><img src="LinkedIn.png" width="20"></button>
                <button><img src="whatsapp.png" width="20"></button>
            </div>

            <div class="login-link">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>
     <!-- ======= Footer ======= -->
  <footer id="footer">
    <p>🌿 © 2025 AgriAssist | Empowering Farmers with Technology 🌿</p>
     <p>Made with ❤️ by Prabhjot Kaur</p>
  </footer>
  
    <script src="signup.js"></script>
    <script src="header.js"></script>
    <script src="footer.js"></script>
</body>

</html>
