<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | FarmMan</title>
  <link rel="stylesheet" a href="forgot password.css">
  <link rel="stylesheet" a href="header.css">
  <link rel="stylesheet" a href="footer.css">
</head>

<body>

  <!-- ======= Header ======= -->
  <header>
    <h1>AgriAssist</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>

    <!-- Social Media Icons -->
    <div class="social-icons">
      <a href="https://facebook.com" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg" alt="Facebook">
      </a>
      <a href="https://instagram.com" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg" alt="Instagram">
      </a>
      <a href="https://linkedin.com" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/linkedin.svg" alt="LinkedIn">
      </a>
      <a href="https://whatsapp.com" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/whatsapp.svg" alt="WhatsApp">
      </a>
    </div>
  </header>


  <div class="container">
    <div class="image-section"></div>
    <div class="form-section">
      <h1>Reset Your Password</h1>
      <p>Enter your registered email to reset your password.</p>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" placeholder="Enter new password">
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Confirm new password">
      </div>

      <button class="btn" onclick="resetPassword()">Reset Password</button>

      <div class="login-link">
        Remember your password? <a href="login.html">Login</a>
      </div>
    </div>
  </div>
  <!-- ======= Footer ======= -->
  <footer id="contact">
    <p>🌿 © 2025 AgriAssist | Empowering Farmers with Technology 🌿</p>
    <p>Made with ❤️ by Prabhjot Kaur</p>
  </footer>

  <script src="script.js"></script>
  <script src="header.js"></script>
  <script src="footer.js"></script>
</body>

</html>
